name: Release

env:
  ZIG_VERSION: "0.15.2"

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            zig_target: x86_64-linux-musl
            ext: ""
          - os: ubuntu-latest
            target: linux-aarch64
            zig_target: aarch64-linux-musl
            ext: ""
          - os: macos-latest
            target: macos-aarch64
            zig_target: aarch64-macos
            ext: ""
          - os: macos-latest
            target: macos-x86_64
            zig_target: x86_64-macos
            ext: ""
          - os: windows-latest
            target: windows-x86_64
            zig_target: x86_64-windows
            ext: ".exe"
          - os: windows-latest
            target: windows-aarch64
            zig_target: aarch64-windows
            ext: ".exe"

    steps:
      - uses: actions/checkout@v6

      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: bash .github/scripts/install-zig.sh "${ZIG_VERSION}"

      - name: Install SQLite (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install SQLite (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3

      - name: Build ReleaseSmall
        run: zig build -Dtarget=${{ matrix.zig_target }} -Doptimize=ReleaseSmall

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hermes-zig-${{ matrix.target }}
          path: zig-out/bin/hermes-zig${{ matrix.ext }}

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8

      - name: Rename binaries
        run: |
          mv hermes-zig-linux-x86_64/hermes-zig hermes-zig-linux-x86_64.bin
          mv hermes-zig-linux-aarch64/hermes-zig hermes-zig-linux-aarch64.bin
          mv hermes-zig-macos-aarch64/hermes-zig hermes-zig-macos-aarch64.bin
          mv hermes-zig-macos-x86_64/hermes-zig hermes-zig-macos-x86_64.bin
          mv hermes-zig-windows-x86_64/hermes-zig.exe hermes-zig-windows-x86_64.exe
          mv hermes-zig-windows-aarch64/hermes-zig.exe hermes-zig-windows-aarch64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hermes-zig-linux-x86_64.bin
            hermes-zig-linux-aarch64.bin
            hermes-zig-macos-aarch64.bin
            hermes-zig-macos-x86_64.bin
            hermes-zig-windows-x86_64.exe
            hermes-zig-windows-aarch64.exe
          generate_release_notes: true
